<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ASSET_PREFIX}}/styles.css">
</head>
<body class="archive-page">
  <div class="page-shell">
    <header class="hero archive-hero">
      <div class="hero-backdrop"></div>
      <div class="hero-actions">
        <a class="top-link" href="{{LATEST_PATH}}">Latest</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme">Theme</button>
      </div>
      <div class="hero-copy">
        <p class="eyebrow">Daily Briefing Archive</p>
        <h1>Daily News Library</h1>
        <p class="hero-date">Last updated {{LAST_UPDATED}}</p>
        <p class="hero-subtitle">A static archive of each daily edition, plus a stable latest route for phone bookmarks.</p>
      </div>
      <a class="latest-card" href="{{LATEST_PATH}}">
        <span class="summary-label">Current edition</span>
        <strong>{{LATEST_DATE}}</strong>
        <span>{{LATEST_SUBTITLE}}</span>
      </a>
    </header>

    <main class="content-shell archive-shell">
      <section class="archive-grid">
        {{ARCHIVE_ITEMS}}
      </section>
    </main>
  </div>
  <script src="{{ASSET_PREFIX}}/app.js"></script>
</body>
</html>
